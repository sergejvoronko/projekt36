// ── State ─────────────────────────────────────────────────────────────────────
let currentCat = 'ref';
let currentChIdx = 0;  // index into filtered chapter list
let currentPage = 0;   // page offset within chapter (0-based)
let catChapters = [];  // chapters in current category

// ── Chapter lookup ────────────────────────────────────────────────────────────
const chByCode = {};
CHAPTERS.forEach(ch => { chByCode[ch.code] = ch; });

// ── Category selection ────────────────────────────────────────────────────────
const CAT_LABELS = {
  ref: 'Reference', engine: 'Engine Management',
  trans: 'Transmission', safety: 'Safety',
  body: 'Body Electronics', systems: 'Body Systems',
  location: 'Location & Connectors',
};

function selectCat(cat) {
  currentCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  document.getElementById('sidebarCatLabel').textContent = CAT_LABELS[cat];
  catChapters = CHAPTERS.filter(c => c.cat === cat);
  renderChList();
  // auto-select first
  if (catChapters.length) openChapter(0);
}

function renderChList() {
  const list = document.getElementById('chList');
  list.innerHTML = catChapters.map((ch, i) => `
    <div class="ch-item${i === currentChIdx ? ' active' : ''}" onclick="openChapter(${i})">
      <span class="ch-code">${ch.code}</span>
      <span class="ch-name">${ch.title}</span>
    </div>
  `).join('');
}

// ── Chapter/page navigation ───────────────────────────────────────────────────
function openChapter(idx) {
  currentChIdx = idx;
  currentPage = 0;
  zoomFit();
  renderChList();
  renderPage();
  // Close mobile sidebar after selection
  if (window.innerWidth <= 768) {
    document.getElementById('sidebar').classList.remove('open');
  }
}

function openChapterByCode(code) {
  const ch = chByCode[code];
  if (!ch) return;
  selectCat(ch.cat);
  const idx = catChapters.findIndex(c => c.code === code);
  if (idx >= 0) openChapter(idx);
}

function goPrev() {
  if (currentPage > 0) { currentPage--; renderPage(); }
  else if (currentChIdx > 0) { openChapter(currentChIdx - 1); currentPage = catChapters[currentChIdx].p[1] - catChapters[currentChIdx].p[0]; renderPage(); }
}

function goNext() {
  const ch = catChapters[currentChIdx];
  const maxPage = ch.p[1] - ch.p[0];
  if (currentPage < maxPage) { currentPage++; renderPage(); }
  else if (currentChIdx < catChapters.length - 1) { openChapter(currentChIdx + 1); }
}

function renderPage() {
  const ch = catChapters[currentChIdx];
  if (!ch) return;
  const pdfPage = ch.p[0] + currentPage;
  const totalPages = ch.p[1] - ch.p[0] + 1;
  const padded = String(pdfPage).padStart(3, '0');

  // Title bar
  const titleEl = document.getElementById('viewerTitle');
  titleEl.innerHTML = `<span>${ch.code}</span> — ${ch.title}`;

  // Page counter
  document.getElementById('viewerPages').textContent =
    `Page ${currentPage + 1} / ${totalPages}  ·  PDF §${pdfPage}`;

  // Prev/next buttons
  const isFirstPage = currentPage === 0 && currentChIdx === 0;
  const isLastPage = currentPage === totalPages - 1 && currentChIdx === catChapters.length - 1;
  document.getElementById('btnPrev').disabled = isFirstPage;
  document.getElementById('btnNext').disabled = isLastPage;

  // Image
  const img = document.getElementById('pageImg');
  const placeholder = document.getElementById('viewerPlaceholder');
  const src = `pages/${padded}.webp`;

  placeholder.style.display = 'none';
  img.style.display = 'block';
  img.alt = `${ch.code} — ${ch.title} — page ${currentPage + 1}`;

  if (img.src !== location.origin + '/schemas/' + src && img.src !== src) {
    img.dataset.loading = '1';
    img.src = src;
    img.onload = () => { delete img.dataset.loading; };
    img.onerror = () => {
      delete img.dataset.loading;
      placeholder.textContent = `Page image not yet available (PDF page ${pdfPage})`;
      placeholder.style.display = 'flex';
      img.style.display = 'none';
    };
  }

  // Pre-load next page
  const nextPdf = pdfPage + 1;
  if (nextPdf <= 577) {
    const pre = new Image();
    pre.src = `pages/${String(nextPdf).padStart(3,'0')}.webp`;
  }

  // Cross-references
  renderXrefs(ch.code);

  // Scroll viewer to top
  document.getElementById('viewerScroll').scrollTop = 0;
}

function renderXrefs(code) {
  const refs = XREFS[code] || [];
  const container = document.getElementById('xrefLinks');
  if (!refs.length) {
    container.innerHTML = '<span style="font-family:\'IBM Plex Mono\',monospace;font-size:.65rem;color:var(--t4)">—</span>';
    return;
  }
  container.innerHTML = refs.map(r => {
    const ch = chByCode[r];
    if (!ch) return '';
    return `<a class="xref-link" onclick="openChapterByCode('${r}')">${r} ${ch.title}</a>`;
  }).join('');
}

// ── Zoom & Pan ────────────────────────────────────────────────────────────────
let zoomScale = 1.0;
const ZOOM_STEPS = [0.5, 0.67, 0.75, 1.0, 1.25, 1.5, 2.0, 2.5, 3.0, 4.0];

function applyZoom() {
  const img = document.getElementById('pageImg');
  const scroll = document.getElementById('viewerScroll');
  if (zoomScale <= 1.0) {
    img.style.width = '';
    img.style.maxWidth = '100%';
    scroll.classList.remove('pannable');
  } else {
    const fitW = scroll.clientWidth - 32;
    img.style.maxWidth = 'none';
    img.style.width = Math.round(fitW * zoomScale) + 'px';
    scroll.classList.add('pannable');
  }
  document.getElementById('zoomLevel').textContent = zoomScale <= 1.0 ? 'Fit' : Math.round(zoomScale * 100) + '%';
}

function zoomFit() { zoomScale = 1.0; applyZoom(); }

function zoomStep(dir) {
  if (dir > 0) {
    const next = ZOOM_STEPS.find(s => s > zoomScale + 0.01);
    if (next) zoomScale = next;
  } else {
    const prev = [...ZOOM_STEPS].reverse().find(s => s < zoomScale - 0.01);
    zoomScale = prev || 1.0;
  }
  applyZoom();
}

// Zoom via Ctrl+scroll or touchpad pinch (browsers report pinch as ctrlKey+wheel)
// Plain scroll (two-finger swipe) is left to native overflow:auto scrolling
document.getElementById('viewerScroll').addEventListener('wheel', e => {
  if (!e.ctrlKey) return; // let browser handle regular scroll/swipe natively
  if (document.getElementById('pageImg').style.display === 'none') return;
  e.preventDefault();
  const scroll = document.getElementById('viewerScroll');
  const rect = scroll.getBoundingClientRect();
  const cx = e.clientX - rect.left + scroll.scrollLeft;
  const cy = e.clientY - rect.top  + scroll.scrollTop;
  const pw = scroll.scrollWidth, ph = scroll.scrollHeight;
  zoomScale = Math.max(0.5, Math.min(4.0, zoomScale + (e.deltaY < 0 ? 0.12 : -0.12)));
  applyZoom();
  const nw = scroll.scrollWidth, nh = scroll.scrollHeight;
  if (pw > 0) scroll.scrollLeft = cx * nw / pw - (e.clientX - rect.left);
  if (ph > 0) scroll.scrollTop  = cy * nh / ph - (e.clientY - rect.top);
}, { passive: false });

// Drag to pan
(function() {
  const scroll = document.getElementById('viewerScroll');
  let pan = false, px = 0, py = 0, sl = 0, st = 0;
  scroll.addEventListener('mousedown', e => {
    if (zoomScale <= 1.0) return;
    pan = true; px = e.clientX; py = e.clientY;
    sl = scroll.scrollLeft; st = scroll.scrollTop;
    scroll.classList.add('panning'); e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!pan) return;
    scroll.scrollLeft = sl - (e.clientX - px);
    scroll.scrollTop  = st - (e.clientY - py);
  });
  document.addEventListener('mouseup', () => {
    if (pan) { pan = false; scroll.classList.remove('panning'); }
  });
})();

// ── Mobile sidebar ────────────────────────────────────────────────────────────
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

// ── Keyboard navigation ───────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); goNext(); }
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   { e.preventDefault(); goPrev(); }
  if (e.key === '+' || e.key === '=') zoomStep(1);
  if (e.key === '-' || e.key === '_') zoomStep(-1);
  if (e.key === '0') zoomFit();
});

// ── URL hash navigation ───────────────────────────────────────────────────────
function handleHash() {
  const hash = location.hash.slice(1); // e.g. "1210.17"
  if (hash && chByCode[hash]) {
    openChapterByCode(hash);
  }
}

// ── Init ──────────────────────────────────────────────────────────────────────
selectCat('ref');
handleHash();
window.addEventListener('hashchange', handleHash);
</script>
